<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conversa Mirela e Guto</title>

<style>

body{
font-family: Arial;
background:#e5ddd5;
margin:0;
padding:20px;
}

.chat{
max-width:700px;
margin:auto;
}

.msg{
margin:8px 0;
padding:10px;
border-radius:8px;
max-width:70%;
}

.left{
background:white;
}

.right{
background:#DCF8C6;
margin-left:auto;
}

.date{
text-align:center;
margin:20px;
font-size:12px;
background:#ddd;
display:inline-block;
padding:5px 10px;
border-radius:6px;
}

img,video{
max-width:100%;
border-radius:8px;
}

audio{
width:100%;
}

</style>

</head>

<body>

<div class="chat" id="chat"></div>

<script>

fetch('_chat.txt')
.then(r=>r.text())
.then(text=>{

let lines=text.split("\n");
let chat=document.getElementById("chat");

lines.forEach(line=>{

let match=line.match(/[(.?)] (.?): (.*)/);

if(match){

let date=match[1];
let name=match[2];
let msg=match[3];

let div=document.createElement("div");

if(name.toLowerCase().includes("mirela")){
div.className="msg right";
}else{
div.className="msg left";
}

div.innerHTML="<b>"+name+"</b><br>"+msg;

chat.appendChild(div);

}

});

});

</script>

</body>
</html>
