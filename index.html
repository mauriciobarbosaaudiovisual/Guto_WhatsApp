<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Conversa Mirela e Guto</title>

<style>

body{
font-family: Arial;
background:#e5ddd5;
margin:0;
padding:20px;
}

.chat{
max-width:700px;
margin:auto;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:70%;
}

.left{
background:white;
}

.right{
background:#DCF8C6;
margin-left:auto;
}

</style>

</head>

<body>

<h2>Conversa Mirela e Guto</h2>

<div id="chat" class="chat"></div>

<script>

fetch("_chat.txt")
.then(r=>r.text())
.then(text=>{

let chat=document.getElementById("chat")

text.split("\n").forEach(line=>{

let m=line.match(/\[(.*?), (.*?)\] (.*?): (.*)/)

if(m){

let name=m[3]
let msg=m[4]

let div=document.createElement("div")

if(name.toLowerCase().includes("mirela")){
div.className="msg right"
}else{
div.className="msg left"
}

div.innerHTML="<b>"+name+"</b><br>"+msg

chat.appendChild(div)

}

})

})

</script>

</body>
</html>
